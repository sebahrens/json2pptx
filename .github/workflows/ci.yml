name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install fonts and SVG tools for rendering
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-liberation fonts-dejavu-core librsvg2-bin

      - name: Build
        run: go build ./...

      - name: Test with coverage
        run: go test ./... -short -v -race -coverprofile=coverage.out -covermode=atomic -timeout=15m

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          THRESHOLD=70
          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          fi
          echo "✓ Coverage ${COVERAGE}% meets threshold ${THRESHOLD}%"

      - name: Generate coverage report
        run: |
          go tool cover -html=coverage.out -o coverage.html
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Coverage |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|----------|" >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out | grep -E '^[a-z]' | awk '{printf "| %s | %s |\n", $1, $3}' | tail -n +1 | head -30 >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out | tail -1 | awk '{printf "**Total: %s**\n", $3}' >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: coverage
          path: |
            coverage.out
            coverage.html

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.8.0
          args: --timeout=5m

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./... || echo "::warning::govulncheck found vulnerabilities (see above)"
        continue-on-error: true

  pptx-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install fonts and LibreOffice for rendering
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-liberation fonts-dejavu-core \
            libreoffice-impress libreoffice-common poppler-utils

      - name: Build tools
        run: |
          go build -o ./bin/json2pptx ./cmd/json2pptx
          go build -o ./bin/testrand ./cmd/testrand
          go build -o ./bin/validatepptx ./cmd/validatepptx
          echo "$(pwd)/bin" >> $GITHUB_PATH

      - name: Generate PPTX from random test decks
        run: |
          mkdir -p ./test_output
          TEMPLATES=("template_2" "forest-green" "midnight-blue" "warm-coral")

          echo "## PPTX Generation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          for template in "${TEMPLATES[@]}"; do
            output_name="ci_${template}.pptx"
            json_file="./test_output/${template}.json"
            echo "Generating: $output_name"

            # Generate a random JSON deck for this template
            ./bin/testrand generate --seed=42 --output="$json_file"

            if ./bin/json2pptx generate -json "$json_file" -template "$template" -output ./test_output; then
              generated=$(ls -t ./test_output/*.pptx 2>/dev/null | head -1)
              if [ -n "$generated" ]; then
                mv "$generated" "./test_output/$output_name"
                echo "✓ Generated: $output_name" | tee -a $GITHUB_STEP_SUMMARY
              fi
            else
              echo "✗ Failed: $output_name" | tee -a $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Validate PPTX structure
        id: validate
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## PPTX Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Slides | SVG | PNG | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|-----|-----|--------|" >> $GITHUB_STEP_SUMMARY

          FAILED=0
          for pptx in ./test_output/*.pptx; do
            [ -f "$pptx" ] || continue
            filename=$(basename "$pptx")

            # Run validation and capture JSON output
            if result=$(./bin/validatepptx -json "$pptx" 2>&1); then
              slides=$(echo "$result" | jq -r '.slide_count // 0')
              svg=$(echo "$result" | jq -r '.media_stats.SVG // 0')
              png=$(echo "$result" | jq -r '.media_stats.PNG // 0')
              is_valid=$(echo "$result" | jq -r '.is_valid')

              if [ "$is_valid" = "true" ]; then
                echo "| $filename | $slides | $svg | $png | ✓ |" >> $GITHUB_STEP_SUMMARY
              else
                errors=$(echo "$result" | jq -r '.errors[]?' | head -1)
                echo "| $filename | $slides | $svg | $png | ✗ $errors |" >> $GITHUB_STEP_SUMMARY
                FAILED=1
              fi
            else
              echo "| $filename | - | - | - | ✗ Error |" >> $GITHUB_STEP_SUMMARY
              FAILED=1
            fi
          done

          echo "validation_failed=$FAILED" >> $GITHUB_OUTPUT

      - name: LibreOffice conformance check
        id: conformance
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## LibreOffice Conformance Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | PDF Size | Pages | Slides | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|----------|-------|--------|--------|" >> $GITHUB_STEP_SUMMARY

          CONFORMANCE_FAILED=0
          for pptx in ./test_output/*.pptx; do
            [ -f "$pptx" ] || continue
            filename=$(basename "$pptx")
            pdf_file="${pptx%.pptx}.pdf"

            # Convert PPTX to PDF via LibreOffice headless
            if timeout 120 libreoffice --headless --convert-to pdf \
                --outdir ./test_output "$pptx" >/dev/null 2>&1; then

              if [ -f "$pdf_file" ]; then
                pdf_size=$(wc -c < "$pdf_file" | tr -d ' ')

                # Check PDF is non-trivial (>1KB)
                if [ "$pdf_size" -lt 1024 ]; then
                  echo "| $filename | ${pdf_size}B | - | - | ✗ Corrupt PDF |" >> $GITHUB_STEP_SUMMARY
                  CONFORMANCE_FAILED=1
                  continue
                fi

                # Get page count and slide count for comparison
                pdf_pages=$(pdfinfo "$pdf_file" 2>/dev/null | grep "^Pages:" | awk '{print $2}' || echo "?")
                slide_count=$(./bin/validatepptx -json "$pptx" 2>/dev/null | jq -r '.slide_count // 0' || echo "?")

                # Warn if page count doesn't match slide count
                status="✓"
                if [ "$pdf_pages" != "?" ] && [ "$slide_count" != "?" ] && [ "$pdf_pages" != "$slide_count" ]; then
                  status="⚠ pages≠slides"
                fi

                echo "| $filename | ${pdf_size}B | $pdf_pages | $slide_count | $status |" >> $GITHUB_STEP_SUMMARY
              else
                echo "| $filename | - | - | - | ✗ No PDF output |" >> $GITHUB_STEP_SUMMARY
                CONFORMANCE_FAILED=1
              fi
            else
              echo "| $filename | - | - | - | ✗ LibreOffice failed |" >> $GITHUB_STEP_SUMMARY
              CONFORMANCE_FAILED=1
            fi
          done

          echo "conformance_failed=$CONFORMANCE_FAILED" >> $GITHUB_OUTPUT

      - name: Upload PPTX artifacts on failure
        if: steps.validate.outputs.validation_failed == '1' || steps.conformance.outputs.conformance_failed == '1'
        uses: actions/upload-artifact@v6
        with:
          name: pptx-validation-failures
          path: |
            ./test_output/*.pptx
            ./test_output/*.pdf

      - name: Fail if validation errors
        if: steps.validate.outputs.validation_failed == '1' || steps.conformance.outputs.conformance_failed == '1'
        run: |
          if [ "${{ steps.validate.outputs.validation_failed }}" = "1" ]; then
            echo "::error::PPTX structural validation failed. See artifacts for manual review."
          fi
          if [ "${{ steps.conformance.outputs.conformance_failed }}" = "1" ]; then
            echo "::error::LibreOffice conformance check failed. Generated PPTX cannot be opened by presentation software."
          fi
          exit 1
