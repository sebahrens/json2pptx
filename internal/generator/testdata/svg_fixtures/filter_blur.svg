<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <defs>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"/>
    </filter>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="4" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="300" height="300" fill="#ecf0f1"/>
  <!-- Blurred background circle -->
  <circle cx="150" cy="150" r="100" fill="#9b59b6" filter="url(#blur)"/>
  <!-- Sharp foreground with shadow -->
  <rect x="100" y="100" width="100" height="100" fill="#3498db" filter="url(#shadow)" rx="10"/>
  <text x="150" y="260" text-anchor="middle" fill="#2c3e50" font-family="sans-serif" font-size="16">Blur &amp; Shadow Filters</text>
</svg>
