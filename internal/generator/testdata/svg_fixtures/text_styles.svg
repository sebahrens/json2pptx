<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#2c3e50"/>
  <!-- Various text styles -->
  <text x="200" y="50" text-anchor="middle" fill="white" font-family="serif" font-size="32" font-weight="bold">Bold Serif</text>
  <text x="200" y="100" text-anchor="middle" fill="#3498db" font-family="sans-serif" font-size="28" font-style="italic">Italic Sans</text>
  <text x="200" y="150" text-anchor="middle" fill="#e74c3c" font-family="monospace" font-size="24">Monospace</text>
  <text x="200" y="200" text-anchor="middle" fill="#2ecc71" font-family="sans-serif" font-size="20" text-decoration="underline">Underlined</text>
  <text x="200" y="250" text-anchor="middle" fill="#f39c12" font-family="sans-serif" font-size="36" letter-spacing="8">SPACED</text>
</svg>
